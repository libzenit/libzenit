ignore:
  - "tests/*"
  - "benchmarks/*"
  - "_deps/**"
  - "/usr/**"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 90%

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false
