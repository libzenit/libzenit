<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300">
  <defs>
    <radialGradient id="sunGrad" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="40%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#D4A805"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F1C40F" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F1C40F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="240" height="300" rx="36" fill="#0d0d1a"/>

  <!-- Outer glow -->
  <circle cx="120" cy="130" r="56" fill="url(#glowGrad)"/>

  <!-- 8 rays -->
  <g fill="#F1C40F" opacity="0.5">
    <polygon points="115,98 125,98 120,68" transform="rotate(0 120 130)"/>
    <polygon points="115,98 125,98 120,68" transform="rotate(45 120 130)"/>
    <polygon points="115,98 125,98 120,68" transform="rotate(90 120 130)"/>
    <polygon points="115,98 125,98 120,68" transform="rotate(135 120 130)"/>
    <polygon points="115,98 125,98 120,68" transform="rotate(180 120 130)"/>
    <polygon points="115,98 125,98 120,68" transform="rotate(225 120 130)"/>
    <polygon points="115,98 125,98 120,68" transform="rotate(270 120 130)"/>
    <polygon points="115,98 125,98 120,68" transform="rotate(315 120 130)"/>
  </g>

  <!-- Sun body -->
  <circle cx="120" cy="130" r="32" fill="url(#sunGrad)"/>

  <!-- Highlight -->
  <circle cx="110" cy="118" r="10" fill="#FEF08A" opacity="0.5"/>

  <!-- Text -->
  <text x="120" y="222" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="800" fill="#F1C40F" letter-spacing="4">LibZenit</text>

  <line x1="70" y1="237" x2="170" y2="237" stroke="#F1C40F" stroke-width="1" opacity="0.3"/>
</svg>
