name: CI

on: push

jobs:
  build:
    if: github.ref_type != 'tag'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        exclude:
          - os: macos-latest
            compiler: gcc
          - os: windows-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang
        include:
          - os: windows-latest
            compiler: msvc
            build_type: Debug
            shell: pwsh
          - os: windows-latest
            compiler: msvc
            build_type: Release
            shell: pwsh
          - os: ubuntu-latest
            compiler: gcc
            build_type: Debug
            coverage: true
          - os: ubuntu-latest
            compiler: clang
            build_type: Debug
          - os: ubuntu-24.04-arm
            compiler: gcc
            build_type: Debug
            coverage: true
          - os: ubuntu-24.04-arm
            compiler: clang
            build_type: Debug
          - os: macos-latest
            compiler: clang
            build_type: Debug
          - os: windows-latest
            compiler: gcc
            build_type: Debug
            coverage: true
            shell: msys2 {0}

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up MSYS2 (Windows gcc coverage)
        if: matrix.compiler == 'gcc' && startsWith(matrix.os, 'windows')
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-lcov

      - name: Set up compiler
        if: matrix.compiler != 'msvc'
        run: |
          echo "CC=${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}" >> $GITHUB_ENV

      - name: Configure
        run: >
          cmake -B build
          ${{ matrix.compiler == 'gcc' && startsWith(matrix.os, 'windows') && '-G Ninja' || '' }}
          ${{ matrix.compiler == 'gcc' && startsWith(matrix.os, 'windows') && '-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++' || '' }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DLIBZENIT_BUILD_TESTS=ON
          ${{ matrix.coverage && '-DLIBZENIT_BUILD_COVERAGE=ON' || '' }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }} --parallel -V -LE benchmark

      - name: Install lcov
        if: matrix.coverage && !startsWith(matrix.os, 'windows')
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install lcov
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq lcov
          fi

      - name: Generate coverage report
        if: matrix.coverage
        run: |
          lcov --capture -d build --output-file coverage.info \
            --rc lcov_branch_coverage=1 \
            --ignore-errors empty,inconsistent,mismatch
          lcov --remove coverage.info -o coverage.clean \
            '/usr/*' '*/_deps/*' '*/tests/*' \
            '*/googletest/*' \
            --ignore-errors empty,inconsistent
          mv coverage.clean coverage.info
          lcov --list coverage.info --ignore-errors empty,inconsistent

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          flags: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          fail_ci_if_error: false

  ios:
    if: github.ref_type != 'tag'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -B build-ios
          -G Xcode
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DLIBZENIT_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build-ios --config ${{ matrix.build_type }}

  sanitize:
    if: github.ref_type != 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            sanitizer: address+undefined+leak
            flags: -fsanitize=address,undefined,leak -fno-omit-frame-pointer
          - compiler: gcc
            sanitizer: thread
            flags: -fsanitize=thread -fno-omit-frame-pointer
          - compiler: clang
            sanitizer: address+undefined+leak
            flags: -fsanitize=address,undefined,leak -fno-omit-frame-pointer
          - compiler: clang
            sanitizer: thread
            flags: -fsanitize=thread -fno-omit-frame-pointer
          - compiler: clang
            sanitizer: memory
            flags: -fsanitize=memory -fno-omit-frame-pointer -fsanitize-memory-track-origins
          - compiler: clang
            sanitizer: cfi
            flags: -fsanitize=cfi -flto -fvisibility=hidden
            ldflags: -fuse-ld=lld-18
          - compiler: clang
            sanitizer: safe-stack
            flags: -fsanitize=safe-stack
          - compiler: clang
            sanitizer: implicit-truncation
            flags: -fsanitize=implicit-integer-truncation -fno-omit-frame-pointer

    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(fromJson('["memory", "cfi", "implicit-truncation"]'), matrix.sanitizer) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi

      - name: Install lld
        if: matrix.sanitizer == 'cfi'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lld-18

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="${{ matrix.flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.flags }} ${{ matrix.ldflags || '' }}"
          -DLIBZENIT_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel --config Debug

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel -C Debug -V -LE benchmark

  benchmark:
    if: github.ref_type != 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-24.04-arm
            compiler: gcc
          - os: macos-latest
            compiler: clang

    runs-on: ${{ matrix.os }}
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up compiler
        run: |
          echo "CC=${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBZENIT_BUILD_TESTS=OFF \
            -DLIBZENIT_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Run benchmarks (save output)
        run: |
          ctest --test-dir build -L benchmark --output-on-failure -V 2>&1 | \
            tee benchmark_${{ matrix.os }}.log

      - name: Upload benchmark log
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-log-${{ matrix.os }}
          path: benchmark_${{ matrix.os }}.log
          if-no-files-found: error
          retention-days: 1

  collect:
    if: github.ref_type != 'tag'
    needs: [benchmark]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download all benchmark logs
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-log-*
          merge-multiple: true
          path: benchmark_logs

      - name: List downloaded logs
        run: ls -la benchmark_logs/

      - name: Install matplotlib
        run: pip install matplotlib -q

      - name: Generate report
        run: |
          python scripts/benchmark_report.py \
            --env "macOS (Apple Silicon, clang)" \
            --file benchmark_logs/benchmark_macos-latest.log \
            --env "Linux ARM64 (gcc)" \
            --file benchmark_logs/benchmark_ubuntu-24.04-arm.log \
            --env "Linux x86_64 (gcc)" \
            --file benchmark_logs/benchmark_ubuntu-latest.log

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BENCHMARK.md
          git add -f benchmark_charts/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update benchmark report [skip ci]"
            git push
          fi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux-amd64
            cc: gcc
            cxx: g++
          - os: ubuntu-24.04-arm
            arch: linux-arm64
            cc: gcc
            cxx: g++
          - os: macos-latest
            arch: macos-arm64
            cc: clang
            cxx: clang++
          - os: windows-latest
            arch: windows-amd64
            cc: msvc
            cxx: msvc
            shell: pwsh
          - os: macos-latest
            arch: ios-arm64
            cc: clang
            cxx: clang++
            cmake_system: iOS
            cmake_arch: arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up compiler
        if: runner.os != 'Windows' && matrix.cmake_system != 'iOS'
        run: |
          echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Configure (desktop)
        if: matrix.cmake_system == ''
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIBZENIT_BUILD_TESTS=OFF

      - name: Configure (iOS)
        if: matrix.cmake_system != ''
        run: >
          cmake -B build
          -G Xcode
          -DCMAKE_SYSTEM_NAME=${{ matrix.cmake_system }}
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }}
          -DLIBZENIT_BUILD_TESTS=OFF

      - name: Build (desktop)
        if: matrix.cmake_system == ''
        run: cmake --build build --config Release --parallel

      - name: Build (iOS)
        if: matrix.cmake_system != ''
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release --prefix ${{ runner.temp }}/libzenit-${{ matrix.arch }}

      - name: Checksum
        run: python ${{ github.workspace }}/scripts/checksum.py ${{ runner.temp }}/libzenit-${{ matrix.arch }}

      - name: Bundle license
        run: cp ${{ github.workspace }}/LICENSE ${{ runner.temp }}/libzenit-${{ matrix.arch }}/

      - name: Package
        run: tar -C ${{ runner.temp }}/libzenit-${{ matrix.arch }} -czf ${{ runner.temp }}/libzenit-${{ matrix.arch }}.tar.gz .

      - name: Upload to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: ${{ runner.temp }}/libzenit-${{ matrix.arch }}.tar.gz